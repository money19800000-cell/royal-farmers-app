<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/mobile-fix.js"></script>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="/mobile.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  input:focus { outline:none; border-color:#38B2AC !important; box-shadow:0 0 0 3px rgba(56,178,172,.15); }
</style>
</helmet>

<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; font-family:'Plus Jakarta Sans','Helvetica Neue',Helvetica,Arial,'PingFang SC','Microsoft YaHei',sans-serif; background:linear-gradient(135deg,#38B2AC 0%,#4FD1C5 55%,#81E6D9 100%); position:relative; overflow:hidden;">

  <div style="position:absolute; top:-120px; right:-120px; width:420px; height:420px; border-radius:50%; background:rgba(255,255,255,0.05);"></div>
  <div style="position:absolute; bottom:-160px; left:-100px; width:380px; height:380px; border-radius:50%; background:rgba(255,255,255,0.04);"></div>

  <div style="width:100%; max-width:420px; background:#fff; border-radius:20px; box-shadow:0 24px 60px rgba(10,20,60,0.35); padding:40px 38px 34px; position:relative;">
    <div style="display:flex; align-items:center; gap:11px; margin-bottom:6px;">
      <span style="width:38px; height:38px; border-radius:11px; background:linear-gradient(310deg,#4FD1C5,#38B2AC); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:14px;">JF</span>
      <div>
        <div style="font-size:16px; font-weight:800; color:#2D3748;">IB 期权月收益计划</div>
        <div style="font-size:11px; color:#A0AEC0; font-weight:600; letter-spacing:.04em;">Interactive Brokers · 投资人门户</div>
      </div>
    </div>

    <div style="font-size:22px; font-weight:800; color:#2D3748; margin:24px 0 4px;">投资人登录</div>
    <div style="font-size:13px; color:#A0AEC0; margin-bottom:24px;">请输入您的投资人编码与密码查看持仓详情</div>

    <label style="display:block; font-size:12px; font-weight:700; color:#4A5568; margin-bottom:7px;">投资人编码</label>
    <input id="ib-code" value="A2501" placeholder="A2501" style="width:100%; font-size:15px; font-family:inherit; color:#2D3748; padding:13px 15px; border:1px solid #EDF2F7; border-radius:11px; margin-bottom:18px; transition:.15s;"/>

    <label style="display:block; font-size:12px; font-weight:700; color:#4A5568; margin-bottom:7px;">登录密码</label>
    <input id="ib-pwd" type="password" value="········" placeholder="请输入密码" onKeyDown="{{ onKey }}" style="width:100%; font-size:15px; font-family:inherit; color:#2D3748; padding:13px 15px; border:1px solid #EDF2F7; border-radius:11px; margin-bottom:10px; transition:.15s;"/>

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
      <label style="display:flex; align-items:center; gap:7px; font-size:12px; color:#718096; cursor:pointer;"><input type="checkbox" checked="checked" style="width:14px; height:14px; accent-color:#38B2AC;"/>记住此设备</label>
      <span style="font-size:12px; color:#38B2AC; font-weight:600; cursor:pointer;">忘记密码？</span>
    </div>

    <button onClick="{{ onLogin }}" style="width:100%; border:none; cursor:pointer; font-family:inherit; font-size:15px; font-weight:700; color:#fff; padding:14px; border-radius:12px; background:linear-gradient(310deg,#4FD1C5,#38B2AC); box-shadow:0 8px 20px rgba(56,178,172,0.32);">登录账户</button>

    <div style="display:flex; align-items:center; gap:9px; margin-top:22px; padding-top:18px; border-top:1px solid #EDF2F7;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      <span style="font-size:11px; color:#A0AEC0; line-height:1.5;">受银行级加密保护 · 仅家族内部投资人可访问</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  go = () => { try { window.location.href = 'ibfund.dc.html'; } catch (e) {} };
  onLogin = () => this.go();
  onKey = (e) => { if (e.key === 'Enter') this.go(); };
  renderVals() { return { onLogin: this.onLogin, onKey: this.onKey }; }
}
</script>
</body>
</html>
